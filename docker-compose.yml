services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: paper
      POSTGRES_USER: paper
      POSTGRES_PASSWORD: paper
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper -d paper"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      KBF_LLM_USAGE_BASE_URL: ${KBF_LLM_USAGE_BASE_URL:-https://llm-usage.k-biofoundrycopilot.duckdns.org}
      KBF_LLM_USAGE_SERVICE_SECRET: ${KBF_LLM_USAGE_SERVICE_SECRET:-}
      PAPER_APP_NAME: ${PAPER_APP_NAME:-Paper API}
      PAPER_APP_VERSION: ${PAPER_APP_VERSION:-0.1.0}
      PAPER_DATABASE_URL: ${PAPER_DATABASE_URL:-postgresql+psycopg://paper:paper@postgres:5432/paper}
      PAPER_REDIS_URL: ${PAPER_REDIS_URL:-redis://redis:6379/0}
      PAPER_STORAGE_ROOT: ${PAPER_STORAGE_ROOT:-/app/data}
      PAPER_OIDC_ISSUER: ${PAPER_OIDC_ISSUER:-https://sso.k-biofoundrycopilot.duckdns.org/realms/kbf}
      PAPER_OIDC_CLIENT_ID: ${PAPER_OIDC_CLIENT_ID:-paper}
      PAPER_OIDC_AUDIENCE: ${PAPER_OIDC_AUDIENCE:-paper}
      PAPER_OIDC_SCOPES: ${PAPER_OIDC_SCOPES:-openid profile email}
      PAPER_OIDC_PROVIDER_NAME: ${PAPER_OIDC_PROVIDER_NAME:-KBF SSO}
      PAPER_OIDC_JWKS_URL: ${PAPER_OIDC_JWKS_URL:-}
      PAPER_OIDC_ALGORITHMS: ${PAPER_OIDC_ALGORITHMS:-RS256}
      PAPER_SESSION_SECRET: ${PAPER_SESSION_SECRET:-change-me}
      PAPER_SESSION_COOKIE_NAME: ${PAPER_SESSION_COOKIE_NAME:-paper_session}
      PAPER_SESSION_COOKIE_SECURE: ${PAPER_SESSION_COOKIE_SECURE:-false}
      PAPER_SESSION_TTL_S: ${PAPER_SESSION_TTL_S:-86400}
      PYTHONPATH: /app:/opt/kbf-llm-usage/sdk/python
    restart: unless-stopped
    command: >
      bash -lc "python -c 'from app.db import init_schema; init_schema()'
      && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./data:/app/data
      - /opt/kbf-llm-usage/sdk/python:/opt/kbf-llm-usage/sdk/python:ro
    ports:
      - "127.0.0.1:18093:8000"

  worker:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      KBF_LLM_USAGE_BASE_URL: ${KBF_LLM_USAGE_BASE_URL:-https://llm-usage.k-biofoundrycopilot.duckdns.org}
      KBF_LLM_USAGE_SERVICE_SECRET: ${KBF_LLM_USAGE_SERVICE_SECRET:-}
      PAPER_APP_NAME: ${PAPER_APP_NAME:-Paper API}
      PAPER_APP_VERSION: ${PAPER_APP_VERSION:-0.1.0}
      PAPER_DATABASE_URL: ${PAPER_DATABASE_URL:-postgresql+psycopg://paper:paper@postgres:5432/paper}
      PAPER_REDIS_URL: ${PAPER_REDIS_URL:-redis://redis:6379/0}
      PAPER_STORAGE_ROOT: ${PAPER_STORAGE_ROOT:-/app/data}
      PAPER_OIDC_ISSUER: ${PAPER_OIDC_ISSUER:-https://sso.k-biofoundrycopilot.duckdns.org/realms/kbf}
      PAPER_OIDC_CLIENT_ID: ${PAPER_OIDC_CLIENT_ID:-paper}
      PAPER_OIDC_AUDIENCE: ${PAPER_OIDC_AUDIENCE:-paper}
      PAPER_OIDC_SCOPES: ${PAPER_OIDC_SCOPES:-openid profile email}
      PAPER_OIDC_PROVIDER_NAME: ${PAPER_OIDC_PROVIDER_NAME:-KBF SSO}
      PAPER_OIDC_JWKS_URL: ${PAPER_OIDC_JWKS_URL:-}
      PAPER_OIDC_ALGORITHMS: ${PAPER_OIDC_ALGORITHMS:-RS256}
      PAPER_SESSION_SECRET: ${PAPER_SESSION_SECRET:-change-me}
      PAPER_SESSION_COOKIE_NAME: ${PAPER_SESSION_COOKIE_NAME:-paper_session}
      PAPER_SESSION_COOKIE_SECURE: ${PAPER_SESSION_COOKIE_SECURE:-false}
      PAPER_SESSION_TTL_S: ${PAPER_SESSION_TTL_S:-86400}
      PYTHONPATH: /app:/opt/kbf-llm-usage/sdk/python
    restart: unless-stopped
    command: >
      bash -lc "python -m app.jobs"
    volumes:
      - ./data:/app/data
      - /opt/kbf-llm-usage/sdk/python:/opt/kbf-llm-usage/sdk/python:ro

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:18092:80"

volumes:
  postgres-data:
